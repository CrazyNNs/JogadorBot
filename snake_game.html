<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>🐍 Cobrinha - JogadorBot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 { color: #ffdd00; margin-bottom: 10px; }
        .info {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            font-size: 18px;
        }
        .score-box {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 10px;
        }
        canvas {
            border: 3px solid #ffdd00;
            background: #0a0a1e;
            border-radius: 10px;
            display: block;
            margin: 0 auto;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 5px;
            justify-content: center;
        }
        .btn {
            background: rgba(255,221,0,0.2);
            border: 2px solid #ffdd00;
            color: white;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
        }
        .btn:active { background: rgba(255,221,0,0.5); }
        .btn-empty { visibility: hidden; }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        .status.win { background: rgba(0,255,0,0.2); }
        .status.error { background: rgba(255,0,0,0.2); }
        .btn-start {
            background: #ffdd00;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }
        .btn-start:hover { background: #ffe633; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Jogo da Cobrinha</h1>
        <p style="color: #aaa;">Cada maçã = <strong style="color:#ffdd00;">10 Joyens</strong></p>
        
        <div class="info">
            <div class="score-box">🍎 <span id="score">0</span></div>
            <div class="score-box">💰 <span id="joyens">0</span> Joyens</div>
        </div>
        
        <canvas id="game" width="400" height="400"></canvas>
        
        <div class="controls">
            <div class="btn-empty"></div>
            <div class="btn" id="up">⬆️</div>
            <div class="btn-empty"></div>
            <div class="btn" id="left">⬅️</div>
            <div class="btn" id="down">⬇️</div>
            <div class="btn" id="right">➡️</div>
        </div>
        
        <button class="btn-start" id="startBtn">🎮 Iniciar Jogo</button>
        
        <div class="status" id="status">Use as setas ou WASD para jogar!</div>
    </div>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const joyensEl = document.getElementById('joyens');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        
        // Pega os dados da URL
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('user');
        const token = params.get('token');
        const apiUrl = params.get('api') || window.location.origin;
        
        const grid = 20;
        const tileCount = 20;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 0;  // ✅ Começa indo para a DIREITA
        let dy = 1;
        let score = 0;
        let totalJoyens = 0;
        let gameLoop = null;
        let gameRunning = false;
        let lastSyncScore = 0;
        
        function randomFood() {
            let newFood;
            let onSnake = true;
            // Garante que a comida não apareça em cima da cobra
            while (onSnake) {
                newFood = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
                onSnake = snake.some(seg => seg.x === newFood.x && seg.y === newFood.y);
            }
            food = newFood;
        }
        
        function draw() {
            // Fundo
            ctx.fillStyle = '#0a0a1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid sutil
            ctx.strokeStyle = 'rgba(255,255,255,0.05)';
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * grid, 0);
                ctx.lineTo(i * grid, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * grid);
                ctx.lineTo(canvas.width, i * grid);
                ctx.stroke();
            }
            
            // Comida (maçã)
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(food.x * grid + grid/2, food.y * grid + grid/2, grid/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Brilho na maçã
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(food.x * grid + grid/2 - 3, food.y * grid + grid/2 - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            
            // Cobra
            snake.forEach((seg, i) => {
                const isHead = i === 0;
                if (isHead) {
                    ctx.fillStyle = '#ffdd00';
                    ctx.fillRect(seg.x * grid, seg.y * grid, grid, grid);
                    
                    // Olhinhos
                    ctx.fillStyle = '#000';
                    if (dx === 1) { // Direita
                        ctx.fillRect(seg.x * grid + 12, seg.y * grid + 5, 3, 3);
                        ctx.fillRect(seg.x * grid + 12, seg.y * grid + 12, 3, 3);
                    } else if (dx === -1) { // Esquerda
                        ctx.fillRect(seg.x * grid + 5, seg.y * grid + 5, 3, 3);
                        ctx.fillRect(seg.x * grid + 5, seg.y * grid + 12, 3, 3);
                    } else if (dy === -1) { // Cima
                        ctx.fillRect(seg.x * grid + 5, seg.y * grid + 5, 3, 3);
                        ctx.fillRect(seg.x * grid + 12, seg.y * grid + 5, 3, 3);
                    } else { // Baixo
                        ctx.fillRect(seg.x * grid + 5, seg.y * grid + 12, 3, 3);
                        ctx.fillRect(seg.x * grid + 12, seg.y * grid + 12, 3, 3);
                    }
                } else {
                    ctx.fillStyle = i % 2 === 0 ? '#ffa500' : '#ff8800';
                    ctx.fillRect(seg.x * grid + 1, seg.y * grid + 1, grid - 2, grid - 2);
                }
            });
        }
        
        async function syncJoyens(newScore) {
            const applesEaten = newScore - lastSyncScore;
            if (applesEaten <= 0) return;
            
            const reward = applesEaten * 10;
            totalJoyens += reward;
            joyensEl.textContent = totalJoyens;
            
            statusEl.textContent = `🍎 +${reward} Joyens sendo adicionados...`;
            statusEl.className = 'status win';
            
            try {
                const response = await fetch(`${apiUrl}/snake_eat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        token: token,
                        apples: applesEaten
                    })
                });
                const data = await response.json();
                if (data.success) {
                    statusEl.textContent = `✅ +${reward} Joyens adicionados! Total ganho: ${totalJoyens}`;
                } else {
                    statusEl.textContent = `❌ Erro: ${data.error}`;
                    statusEl.className = 'status error';
                }
            } catch (err) {
                statusEl.textContent = `⚠️ Erro de conexão (maçãs ainda contam!)`;
                statusEl.className = 'status error';
                console.error(err);
            }
            
            lastSyncScore = newScore;
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Calcula nova posição da cabeça
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Colisão com parede
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Colisão consigo mesma (ignora a última cauda que vai sumir)
            for (let i = 0; i < snake.length - 1; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }
            
            // Adiciona nova cabeça
            snake.unshift(head);
            
            // Verifica se comeu a maçã
            if (head.x === food.x && head.y === food.y) {
                score++;
                scoreEl.textContent = score;
                randomFood();
                syncJoyens(score);
            } else {
                // Remove a cauda (cobra não cresce)
                snake.pop();
            }
        }
        
        function gameOver() {
            gameRunning = false;
            clearInterval(gameLoop);
            gameLoop = null;
            
            statusEl.textContent = `💀 Game Over! Pontuação: ${score} | Total ganho: ${totalJoyens} Joyens`;
            statusEl.className = 'status error';
            startBtn.textContent = '🔄 Jogar Novamente';
            startBtn.style.display = 'inline-block';
        }
        
        function startGame() {
            // Reseta o estado
            snake = [{x: 10, y: 10}];
            dx = 1;  // ✅ Começa indo para a direita
            dy = 0;
            score = 0;
            lastSyncScore = 0;
            
            // Reset UI
            scoreEl.textContent = 0;
            startBtn.style.display = 'none';
            statusEl.textContent = '🎮 Jogando!';
            statusEl.className = 'status win';
            
            // Gera primeira comida
            randomFood();
            
            // Inicia o loop
            gameRunning = true;
            gameLoop = setInterval(() => {
                update();
                draw();
            }, 120);  // Velocidade um pouco mais lenta para melhor jogabilidade
        }
        
        function changeDirection(newDx, newDy) {
            // Impede reversão direta (não pode ir para trás)
            if (dx === -newDx && newDx !== 0) return;
            if (dy === -newDy && newDy !== 0) return;
            dx = newDx;
            dy = newDy;
        }
        
        // Controles do teclado
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            
            const key = e.key.toLowerCase();
            if (key === 'arrowup' || key === 'w') changeDirection(0, -1);
            else if (key === 'arrowdown' || key === 's') changeDirection(0, 1);
            else if (key === 'arrowleft' || key === 'a') changeDirection(-1, 0);
            else if (key === 'arrowright' || key === 'd') changeDirection(1, 0);
        });
        
        // Controles de toque
        document.getElementById('up').addEventListener('click', () => changeDirection(0, -1));
        document.getElementById('down').addEventListener('click', () => changeDirection(0, 1));
        document.getElementById('left').addEventListener('click', () => changeDirection(-1, 0));
        document.getElementById('right').addEventListener('click', () => changeDirection(1, 0));
        
        startBtn.addEventListener('click', startGame);
        
        // Desenha o estado inicial
        draw();
    </script>
</body>
</html>
